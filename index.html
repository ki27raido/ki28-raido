<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إذاعة KI28 | بث مباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="live-badge">
            <span></span> مباشر
        </div>

        <div class="logo-area">
            <div class="logo-circle" id="logoCircle">
                <i class="fa-solid fa-radio"></i>
            </div>
        </div>

        <h1>إذاعة KI28</h1>
        <p id="status-text">اضغط على الزر بالأسفل للاستماع للبث المباشر</p>

        <div class="waves" id="waveContainer">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <button class="play-btn" id="playBtn">
            <i class="fa-solid fa-play" id="btnIcon"></i>
            <span id="btnText">استمع الآن</span>
        </button>

        <div class="volume-container">
            <i class="fa-solid fa-volume-high" style="color: #8a99ad;"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
